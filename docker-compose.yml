name: fipe

services:
  postgres:
    image: postgres:16-alpine
    container_name: fipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fipe}
      POSTGRES_DB: ${POSTGRES_DB:-fipe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fipe} -d ${POSTGRES_DB:-fipe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fipe-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fipe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fipe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fipe}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fipe-net

  redis:
    image: redis:7-alpine
    container_name: fipe-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fipe-net

  fipe-api:
    build:
      context: ./fipe-api
    container_name: fipe-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-fipe}
      DB_USER: ${POSTGRES_USER:-fipe}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fipe}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-fipe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fipe}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-pelo-menos-32-bytes-em-producao}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      fipe-api-consumer:
        condition: service_started
    networks:
      - fipe-net

  fipe-api-consumer:
    build:
      context: ./fipe-api-consumer
    container_name: fipe-api-consumer
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-fipe}
      DB_USER: ${POSTGRES_USER:-fipe}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fipe}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-fipe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fipe}
    ports:
      - "${CONSUMER_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fipe-net

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:

networks:
  fipe-net:
    driver: bridge
