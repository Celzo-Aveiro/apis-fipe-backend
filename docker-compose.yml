name: fipe

services:
  postgres:
    image: postgres:16-alpine
    container_name: fipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fipe}
      POSTGRES_DB: ${POSTGRES_DB:-fipe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fipe} -d ${POSTGRES_DB:-fipe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fipe-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fipe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fipe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fipe}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fipe-net

  redis:
    image: redis:7-alpine
    container_name: fipe-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fipe-net

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:

networks:
  fipe-net:
    driver: bridge
