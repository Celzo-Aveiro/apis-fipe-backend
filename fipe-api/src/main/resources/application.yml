spring:
  application:
    name: fipe-api
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fipe}
    username: ${DB_USER:fipe}
    password: ${DB_PASSWORD:fipe}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC

  # Migrations sao gerenciadas pela API-2 (dona da escrita do schema).
  flyway:
    enabled: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:fipe}
    password: ${RABBITMQ_PASSWORD:fipe}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

fipe:
  client:
    base-url: ${FIPE_BASE_URL:https://parallelum.com.br/fipe/api/v1}
    timeout-seconds: 10
  messaging:
    exchange: fipe.exchange
    marcas-queue: fipe.marcas.queue
    marcas-routing-key: fipe.marcas

logging:
  level:
    root: INFO
    com.celzo_aveiro: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:fipe}
  rabbitmq:
    host: rabbitmq
  data:
    redis:
      host: redis
