spring:
  application:
    name: fipe-api-consumer
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fipe}
    username: ${DB_USER:fipe}
    password: ${DB_PASSWORD:fipe}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC

  # API-2 e a dona das migrations do schema de veiculos.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:fipe}
    password: ${RABBITMQ_PASSWORD:fipe}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5
        retry:
          enabled: true
          initial-interval: 2s
          max-attempts: 5
          multiplier: 2

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

fipe:
  client:
    base-url: ${FIPE_BASE_URL:https://parallelum.com.br/fipe/api/v1}
    timeout-seconds: 10
  messaging:
    exchange: fipe.exchange
    marcas-queue: fipe.marcas.queue
    marcas-routing-key: fipe.marcas

logging:
  level:
    root: INFO
    com.celzo_aveiro: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:fipe}
  rabbitmq:
    host: rabbitmq
